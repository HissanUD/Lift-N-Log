name: Backend Tests

"on":
    push:
    pull_request:

jobs:
    tests:
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:16
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: gym_api_test_db
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
        
        env:
            DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gym_api_test_db
            TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gym_api_test_db
            SECRET_KEY: ci-test-secret-key
            ALGORITHM: HS256
            ACCESS_TOKEN_EXPIRE_MINUTES: 30



        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
            
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.14"
            
            - name: Install uv
              uses: astral-sh/setup-uv@v5

            - name: Install dependencies
              run: uv sync

            - name: Run migrations
              run: uv run alembic upgrade head

            - name: Run tests
              run: uv run python -m pytest
