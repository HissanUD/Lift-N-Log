services:
  api:
    build: .
    ports:
      - 8000:8000
    environment:
      - DATABASE_URL=postgresql://gym_user:password@postgres:5432/gym_api_db
      - SECRET_KEY=secret_docker_bleh_bleh_bleh
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run python -m app.seed &&
             uv run uvicorn app.main:app --host 0.0.0.0 --port 8000"
  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=gym_user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=gym_api_db
    ports:
      - 5433:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gym_user -d gym_api_db"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s
volumes:
  postgres_data:
    


